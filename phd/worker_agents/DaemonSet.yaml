apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-specific-app
spec:
  selector:
    matchLabels:
      app: node-info
  template:
    metadata:
      labels:
        app: node-info
    spec:
      serviceAccountName: agent-sa
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - cluster-test-worker
                      - cluster-test-worker2
                      - cluster-test-worker3
      containers:
        - name: name-node-container
          image: pepi1989/revision-agent:v28
          imagePullPolicy: Always
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MONITORING_NAMESPACE
              value: "monitoring"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: PROMETHEUS_URL
              value: "http://prometheus-k8s.monitoring.svc.cluster.local:9090"
            - name: FEDERATION_URL_SEND
              value: "http://fed-master-service:8002/upload_weights_fdl_master"
            - name: FEDERATION_URL_RECEIVE
              value: "http://eceive-fed-weights-service:8001/get_aggregated_json_weights"